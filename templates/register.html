{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card p-4 mt-5">
      <div class="card-header bg-success text-white text-center mb-3">
        <h4><i class="fas fa-user-plus me-2"></i>Create Account</h4>
      </div>
      <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" name="username" class="form-control" required autofocus/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password <small class="text-muted">(min 8 chars)</small></label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-key"></i></span>
            <!-- id="passwordInput" for JavaScript -->
            <input type="password" name="password" id="passwordInput" class="form-control" required minlength="8"/>
          </div>
          
          <!-- password strength bar -->
          <div class="progress mt-2" style="height: 8px;">
            <div id="strengthBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
          </div>
          
          <!-- password strength text -->
          <small id="strengthText" class="form-text text-muted">Start typing a password...</small>
        </div>
        <button type="submit" class="btn btn-success w-100">
          <i class="fas fa-user-plus me-2"></i>Register
        </button>
      </form>
      <p class="text-center mt-3 mb-0 text-muted small">
        Already have an account? <a href="/login">Login</a>
      </p>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/strength.js') }}"></script>
{% endblock %}
