{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 mt-5">
            <div class="card-header bg-warning text-dark text-center mb-3">
                <h4><i class="fas fa-key me-2"></i>Change Password</h4>
            </div>

            <div class="alert alert-secondary small">
                New password must contain at least 8 characters, uppercase letter,
                lowercase letter, number, and special character.
            </div>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Current Password</label>
                    <input type="password" name="current_password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">New Password</label>
                    <input type="password" name="new_password" id="passwordInput" class="form-control" required>
                    
                    <div class="progress mt-2" style="height: 8px;">
                        <div id="strengthBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                    </div>
                    
                    <small id="strengthText" class="form-text text-muted">Start typing a new password...</small>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-warning w-100">
                    <i class="fas fa-save me-2"></i>Update Password
                </button>
            </form>

            <p class="text-center mt-3 mb-0">
                <a href="/dashboard">Back to Dashboard</a>
            </p>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='js/strength.js') }}"></script>
{% endblock %}
